<!DOCTYPE html>
<html>
<head>
  <title>Guntur Inti Ruchulu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>Guntur Inti Ruchulu</h1>
  <button onclick="goToCart()">Cart 🛒</button>
</header>

<section class="hero">
  <h2>Authentic Homemade Pickles</h2>
  <p>Fresh | Spicy | Traditional</p>
</section>

<section class="products" id="productList"></section>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
function renderProducts() {
  const container = document.getElementById("productList");

  products.forEach(p => {
    let variantsHTML = "";

    p.variants.forEach((v, i) => {
      variantsHTML += `
        <button onclick="addToCart(${p.id}, ${i})">
          ${v.size} - ₹${v.price}
        </button>
      `;
    });

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div>${variantsHTML}</div>
      </div>
    `;
  });
}

function goToCart(){
  window.location.href = "cart.html";
}

renderProducts();
</script>

</body>
</html>
