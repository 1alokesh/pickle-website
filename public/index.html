<!DOCTYPE html>
<html>
<head>
  <title>Homemade Pickles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Order Homemade Pickles 🍯</h1>

  <form id="orderForm">
    <input type="text" placeholder="Your Name" id="name" required>
    <input type="text" placeholder="Phone Number" id="phone" required>
    <input type="text" placeholder="Address" id="address" required>

    <select id="pickle">
      <option>Mango Pickle</option>
      <option>Lemon Pickle</option>
      <option>Mixed Pickle</option>
    </select>

    <input type="number" placeholder="Quantity (kg)" id="quantity" required>
    <button type="submit">Place Order</button>
  </form>

  <script>
    document.getElementById("orderForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const order = {
        name: name.value,
        phone: phone.value,
        address: address.value,
        pickle: pickle.value,
        quantity: quantity.value
      };

      const res = await fetch("/order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(order)
      });

      alert("Order placed successfully!");
      this.reset();
    });
  </script>
</body>
</html>
