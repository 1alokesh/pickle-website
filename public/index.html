<!DOCTYPE html>
<html>
<head>
  <title>Guntur Inti Ruchulu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>🌶️ Guntur Inti Ruchulu</h2>
  <button onclick="goToCart()">🛒</button>
</div>

<!-- HERO -->
<div class="hero">
  <h3>Authentic Homemade Pickles</h3>
  <p>Fresh | Spicy | Traditional</p>
</div>

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
function renderProducts() {
  const container = document.getElementById("productList");
  container.innerHTML = "";

  products.forEach(p => {
    let variantButtons = "";

    p.variants.forEach((v, i) => {
      variantButtons += `
        <button onclick="addToCart(${p.id}, ${i})">
          ${v.size} - ₹${v.price}
        </button>
      `;
    });

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="variants">
          ${variantButtons}
        </div>
      </div>
    `;
  });
}

function goToCart(){
  window.location.href = "cart.html";
}

renderProducts();
</script>

</body>
</html>
