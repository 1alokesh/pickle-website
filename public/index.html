<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guntur Inti Ruchulu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h2>🌶️ Pickles</h2>
  <button onclick="goToCart()">🛒</button>
</div>

<div class="hero">
  <h3>Authentic Homemade Pickles</h3>
</div>

<div id="productList" class="products"></div>
<div id="cartBar" class="cart-bar"></div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>
function renderProducts(){
  const c=document.getElementById("productList");
  c.innerHTML="";

  products.forEach(p=>{
    c.innerHTML+=`
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>

      ${p.variants.map((v,i)=>`
        <div class="variant-row">
          <span>${v.size} - ₹${v.price}</span>
          <button onclick="addToCart(${p.id},${i})">ADD</button>
        </div>
      `).join("")}

    </div>`;
  });

  updateCartBar();
}
renderProducts();
</script>

</body>
</html>
