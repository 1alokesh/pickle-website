<!DOCTYPE html>
<html>
<head>
    <title>Mana Inti Ruchulu Pickles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff8f0;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #b22222;
            color: white;
            padding: 20px;
        }

        .owner-info {
            font-size: 14px;
            margin-top: 5px;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        select, input, textarea {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            background: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .total {
            font-size: 18px;
            font-weight: bold;
            margin: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>🥭 Mana Inti Ruchulu Pickles</h1>
    <div class="owner-info">
        Owner: Padma | Contact: 9121991628
    </div>
</header>

<div class="container">

<form action="/order" method="POST" onsubmit="return validateForm()">

<div class="cards">

    <!-- Mango -->
    <div class="card">
        <h3>🥭 Mango Pickle</h3>
        <img src="https://images.unsplash.com/photo-1604908177522-4025c02d3c77?auto=format&fit=crop&w=500&q=60">
        <select onchange="updatePrice('Mango', this.value)">
            <option value="0">Select Size</option>
            <option value="320">1 Kg - ₹320</option>
            <option value="160">500 Gms - ₹160</option>
            <option value="80">250 Gms - ₹80</option>
        </select>
    </div>

    <!-- Chicken -->
    <div class="card">
        <h3>🍗 Chicken Pickle</h3>
        <img src="https://images.unsplash.com/photo-1625944525903-8c5e78d2f0a7?auto=format&fit=crop&w=500&q=60">
        <select onchange="updatePrice('Chicken', this.value)">
            <option value="0">Select Size</option>
            <option value="900">1 Kg - ₹900</option>
            <option value="450">500 Gms - ₹450</option>
            <option value="230">250 Gms - ₹230</option>
        </select>
    </div>

    <!-- Gongura Chicken -->
    <div class="card">
        <h3>🌿 Gongura Chicken Pickle</h3>
        <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=500&q=60">
        <select onchange="updatePrice('Gongura Chicken', this.value)">
            <option value="0">Select Size</option>
            <option value="900">1 Kg - ₹900</option>
            <option value="450">500 Gms - ₹450</option>
            <option value="230">250 Gms - ₹230</option>
        </select>
    </div>

</div>

<div class="total" id="finalPrice">
    Total Price: ₹0
</div>

<input type="hidden" name="price" id="selectedPrice">

<h3>Customer Details</h3>
<input type="text" name="name" placeholder="Full Name" required><br>
<input type="text" name="phone" placeholder="Phone Number" required><br>
<textarea name="address" placeholder="Full Address" required></textarea><br>
<input type="text" name="state" placeholder="State" required><br>
<input type="text" name="pincode" placeholder="Pincode" required><br>

<button type="submit">Place Order</button>

</form>
</div>

<script>
let prices = {
    "Mango": 0,
    "Chicken": 0,
    "Gongura Chicken": 0
};

function updatePrice(name, price) {
    prices[name] = parseInt(price) || 0;
    calculateTotal();
}

function calculateTotal() {
    let total = 0;
    for (let item in prices) {
        total += prices[item];
    }
    document.getElementById("finalPrice").innerText = "Total Price: ₹" + total;
    document.getElementById("selectedPrice").value = total;
}

function validateForm() {
    let total = 0;
    for (let item in prices) {
        total += prices[item];
    }

    if (total === 0) {
        alert("Please select at least one pickle.");
        return false;
    }

    return true;
}
</script>

</body>
</html>
