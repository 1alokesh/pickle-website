<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guntur Inti Ruchulu Pickles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to right, #fff7f0, #ffe0b2);
    }

    header {
      background: linear-gradient(135deg, #b71c1c, #e53935);
      color: #fff;
      text-align: center;
      padding: 30px;
    }

    header h1 {
      margin: 0;
    }

    form {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .pickle-item {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .pickle-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #b71c1c, #e53935);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<header>
  <h1>Guntur Inti Ruchulu Pickles</h1>
  <p>Homemade Authentic Taste</p>
</header>

<form action="/order" method="POST">

  <h2>Customer Details</h2>

  <input type="text" name="name" placeholder="Full Name" required>

  <!-- ✅ PHONE FIELD -->
  <input 
    type="tel" 
    id="phone" 
    name="phone" 
    required 
    maxlength="10" 
    pattern="[0-9]{10}" 
    placeholder="Enter 10-digit mobile number"
  >

  <textarea name="address" placeholder="Address" required></textarea>

  <input type="text" name="state" placeholder="State" required>
  <input type="text" name="pincode" placeholder="Pincode" required>

  <h2>Order Items</h2>

  <!-- SAMPLE ITEMS -->
  <div class="pickle-item">
    <label>
      <input type="checkbox" name="items" value="Mango Pickle"> Mango Pickle
    </label>
  </div>

  <div class="pickle-item">
    <label>
      <input type="checkbox" name="items" value="Chicken Pickle"> Chicken Pickle
    </label>
  </div>

  <div class="pickle-item">
    <label>
      <input type="checkbox" name="items" value="Prawn Pickle"> Prawn Pickle
    </label>
  </div>

  <button type="submit">Place Order</button>

</form>

<!-- ✅ FULL SCRIPT -->
<script>
const form = document.querySelector("form");
const submitBtn = document.querySelector("button");
const phoneInput = document.getElementById("phone");

/* ================= PHONE INPUT CONTROL ================= */
phoneInput.addEventListener("input", function () {
  // Remove non-numeric characters
  this.value = this.value.replace(/[^0-9]/g, "");

  // Limit to 10 digits
  if (this.value.length > 10) {
    this.value = this.value.slice(0, 10);
  }
});

/* ================= FORM SUBMIT ================= */
form.addEventListener("submit", function (e) {
  e.preventDefault();

  const phone = phoneInput.value.trim();

  // ✅ Validation
  if (phone.length !== 10) {
    alert("Please enter a valid 10-digit mobile number");
    phoneInput.focus();
    return;
  }

  // ✅ Button UX
  submitBtn.innerText = "Placing Order...";
  submitBtn.disabled = true;

  form.submit();
});
</script>

</body>
</html>
