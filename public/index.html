<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mana Inti Ruchulu Pickles</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #fff8e1; }
    h1 { text-align: center; color: #b71c1c; }
    .pickles { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .pickle-item { border: 1px solid #ccc; padding: 10px; border-radius: 10px; width: 200px; text-align: center; background: #fff; }
    .pickle-item img { width: 150px; height: 150px; object-fit: cover; border-radius: 10px; }
    .total { font-size: 18px; margin-top: 10px; font-weight: bold; text-align: center; }
    button { background: #b71c1c; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    button:hover { background: #f44336; }
    input, select { width: 100%; margin-top: 5px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; }
    form { max-width: 600px; margin: auto; background: #fff3e0; padding: 20px; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Mana Inti Ruchulu Pickles</h1>

<form id="orderForm">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="text" id="phone" placeholder="Phone Number" required>
  <input type="text" id="address" placeholder="Address" required>
  <input type="text" id="state" placeholder="State" required>
  <input type="text" id="pincode" placeholder="Pincode" required>

  <h2>Select Pickles</h2>
  <div class="pickles">
    <!-- Mango Pickle -->
    <div class="pickle-item" data-name="Mango Pickle">
      <img src="images/mango.jpg" alt="Mango Pickle">
      <div>Mango Pickle</div>
      <select class="size-select">
        <option value="1kg" data-price="320">1kg - ₹320</option>
        <option value="500gms" data-price="160">500gms - ₹160</option>
        <option value="250gms" data-price="80">250gms - ₹80</option>
      </select>
      <input type="number" class="quantity-input" value="0" min="0">
    </div>

    <!-- Chicken Pickle -->
    <div class="pickle-item" data-name="Chicken Pickle">
      <img src="images/chicken.jpg" alt="Chicken Pickle">
      <div>Chicken Pickle</div>
      <select class="size-select">
        <option value="1kg" data-price="900">1kg - ₹900</option>
        <option value="500gms" data-price="450">500gms - ₹450</option>
        <option value="250gms" data-price="230">250gms - ₹230</option>
      </select>
      <input type="number" class="quantity-input" value="0" min="0">
    </div>

    <!-- Gongura Chicken -->
    <div class="pickle-item" data-name="Gongura Chicken">
      <img src="images/gongura.jpg" alt="Gongura Chicken">
      <div>Gongura Chicken</div>
      <select class="size-select">
        <option value="1kg" data-price="900">1kg - ₹900</option>
        <option value="500gms" data-price="450">500gms - ₹450</option>
        <option value="250gms" data-price="230">250gms - ₹230</option>
      </select>
      <input type="number" class="quantity-input" value="0" min="0">
    </div>
  </div>

  <div class="total">Total: ₹<span id="totalPrice">0</span></div>

  <button type="submit">Place Order</button>
</form>

<script>
  const form = document.getElementById("orderForm");
  const totalPriceEl = document.getElementById("totalPrice");

  function calculateTotal() {
    let total = 0;
    document.querySelectorAll(".pickle-item").forEach(item => {
      const qty = parseInt(item.querySelector(".quantity-input").value) || 0;
      const price = parseInt(item.querySelector(".size-select").selectedOptions[0].dataset.price);
      total += qty * price;
    });
    totalPriceEl.innerText = total;
    return total;
  }

  document.querySelectorAll(".quantity-input, .size-select").forEach(el => {
    el.addEventListener("input", calculateTotal);
    el.addEventListener("change", calculateTotal);
  });

  form.addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const state = document.getElementById("state").value.trim();
    const pincode = document.getElementById("pincode").value.trim();

    const items = [];
    document.querySelectorAll(".pickle-item").forEach(item => {
      const itemName = item.dataset.name;
      const size = item.querySelector(".size-select").value;
      const price = parseInt(item.querySelector(".size-select").selectedOptions[0].dataset.price);
      const quantity = parseInt(item.querySelector(".quantity-input").value) || 0;
      if(quantity > 0) {
        items.push({
          name: itemName,
          size: size,
          quantity: quantity,
          total: quantity * price
        });
      }
    });

    if(!name || !phone || !address || !state || !pincode || items.length === 0){
      alert("All fields are required and select at least one pickle.");
      return;
    }

    const totalPrice = items.reduce((acc, i) => acc + i.total, 0);

    fetch("/order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, address, state, pincode, items: JSON.stringify(items), totalPrice })
    })
    .then(res => res.text())
    .then(data => {
      document.body.innerHTML = data;
    })
    .catch(err => console.error(err));
  });
</script>

</body>
</html>
