<!DOCTYPE html>
<html>
<head>
  <title>Mana Inti Ruchulu</title>
</head>
<body>
  <h1>Mana Inti Ruchulu</h1>
  <h3>Homemade Traditional Pickles</h3>
  <p>Owner: Padma | Contact: 9121991628</p>

  <form action="/order" method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Phone:</label><br>
    <input type="text" name="phone" required><br><br>
    <label>Email:</label><br>
    <input type="email" name="email" required /><br><br>

    <label>Select Pickle:</label><br>
    <select name="pickle" required>
      <option value="Mango Pickle">Mango Pickle</option>
      <option value="Chicken Pickle">Chicken Pickle</option>
      <option value="Gongura Chicken">Gongura Chicken</option>
    </select><br><br>

    <label>Quantity:</label><br>
    <select name="quantity" required>
      <option value="500g">500g</option>
      <option value="1kg">1kg</option>
      <option value="2kg">2kg</option>
    </select><br><br>

    <label>Address:</label><br>
    <textarea name="address" required></textarea><br><br>

    <label>State:</label><br>
    <input type="text" name="state" required><br><br>

    <label>Pincode:</label><br>
    <input type="text" name="pincode" required><br><br>

    <button type="submit">Place Order</button>
  </form>
</body>
</html>
