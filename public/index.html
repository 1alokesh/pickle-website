<script>
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const state = document.getElementById("state").value;
  const pincode = document.getElementById("pincode").value;
  const pickle = document.getElementById("pickle").value;
  const quantity = document.getElementById("quantity").value;

  const message = `Hello Padma,

New Order Received for Mana Inti Ruchulu 🍲

Customer Name: ${name}
Customer Phone: ${phone}
Pickle: ${pickle}
Quantity: ${quantity} kg
Address: ${address}, ${state} - ${pincode}

Please confirm delivery within 4-5 days.`;

  const whatsappURL = "https://wa.me/919182542414?text=" + encodeURIComponent(message);

  window.location.href = whatsappURL;
});
</script>
