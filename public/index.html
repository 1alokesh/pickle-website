<!DOCTYPE html>
<html>
<head>
  <title>Mana Inti Ruchulu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mana Inti Ruchulu 🍲</h1>
<h3>Homemade Pickles with Authentic Taste</h3>

<p><strong>Owner:</strong> Padma</p>
<p><strong>Contact:</strong> 9121991628</p>

<h2>Place Your Order</h2>

<form id="orderForm">

<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<input type="text" id="address" placeholder="Address" required>
<input type="text" id="state" placeholder="State" required>
<input type="text" id="pincode" placeholder="Pincode" required>

<select id="pickle" required>
  <option>Mango Pickle</option>
  <option>Lemon Pickle</option>
  <option>Mixed Pickle</option>
  <option>Chicken Pickle</option>
  <option>Gongura Chicken</option>
</select>

<input type="number" id="quantity" placeholder="Quantity (kg)" required>

<button type="submit">Place Order</button>

</form>

<script>
document.getElementById("orderForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const order = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    state: document.getElementById("state").value,
    pincode: document.getElementById("pincode").value,
    pickle: document.getElementById("pickle").value,
    quantity: document.getElementById("quantity").value
  };

  await fetch("/order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(order)
  });

  alert("Order placed successfully!");
  this.reset();
});
</script>

</body>
</html>
