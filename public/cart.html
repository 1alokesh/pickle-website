<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h2>Checkout</h2>
  <button onclick="history.back()">←</button>
</div>

<div class="container">

<div id="cartItems"></div>

<h3>Total: ₹<span id="total"></span></h3>

<form id="f">
  <input id="name" placeholder="Full Name" required>
  <input id="phone" placeholder="Mobile Number" required maxlength="10">
  <input id="address" placeholder="Address" required>
  <input id="state" placeholder="State" required>
  <input id="pincode" placeholder="Pincode" required>

  <button type="submit">Place Order</button>
</form>

</div>

<script src="cart.js"></script>

<script>
function renderCartItems(){
  const div = document.getElementById("cartItems");
  div.innerHTML = "";

  if(cart.length === 0){
    div.innerHTML = "<p style='text-align:center'>Cart is empty 🛒</p>";
    document.getElementById("total").innerText = 0;
    return;
  }

  cart.forEach((item, i) => {
    div.innerHTML += `
      <div class="cart-card">
        <p><b>${item.name}</b></p>
        <p>${item.size}</p>

        <div class="qty-control">
          <button onclick="decreaseQty(${i})">-</button>
          <span>${item.quantity}</span>
          <button onclick="increaseQty(${i})">+</button>
        </div>

        <p><b>₹${item.total}</b></p>
      </div>
    `;
  });

  document.getElementById("total").innerText = getCartTotal();
}

renderCartItems();

/* PHONE VALIDATION */
document.getElementById("phone").oninput = function(){
  this.value = this.value.replace(/[^0-9]/g,'').slice(0,10);
};

/* ✅ FINAL FIXED SUBMIT */
document.getElementById("f").onsubmit = function(e){
  e.preventDefault();

  const nameVal = document.getElementById("name").value.trim();
  const phoneVal = document.getElementById("phone").value.trim();
  const addressVal = document.getElementById("address").value.trim();
  const stateVal = document.getElementById("state").value.trim();
  const pincodeVal = document.getElementById("pincode").value.trim();

  fetch("/order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: nameVal,
      phone: phoneVal,
      address: addressVal,
      state: stateVal,
      pincode: pincodeVal,
      items: cart,
      totalPrice: getCartTotal()
    })
  })
  .then(r => r.text())
  .then(d => {
    document.body.innerHTML = d;
    localStorage.removeItem("cart");
  })
  .catch(() => alert("Order failed"));
};
</script>

</body>
</html>
